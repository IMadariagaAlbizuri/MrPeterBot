# Variables sets for all controllers
controller_manager:
  ros__parameters:
    # Every 10ms controllers parameters are updated
    update_rate: 100
    # Controller types being used
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

# Mr. Peterbot driving controller settings
diff_drive_controller:
  ros__parameters:
    left_wheel_names: ['rear_left_wheel_joint']
    right_wheel_names: ['rear_right_wheel_joint']
    wheel_separation: 0.24
    wheel_radius: 0.05
    odom_frame_id: odom
    base_frame_id: base_link
    publish_rate: 50.0
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    use_stamped_vel: false